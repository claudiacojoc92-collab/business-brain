version: "3.9"

# Test environment — ephemeral, no persistent volumes.
# Usage: docker compose -f docker-compose.test.yml up -d

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: bb-postgres-test
    environment:
      POSTGRES_USER:     bbuser
      POSTGRES_PASSWORD: bbpassword
      POSTGRES_DB:       businessbrain_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bbuser -d businessbrain_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:7-alpine
    container_name: bb-redis-test
    ports:
      - "6380:6379"
    tmpfs:
      - /data

  migrate-test:
    image: flyway/flyway:10-alpine
    container_name: bb-migrate-test
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      FLYWAY_URL:      jdbc:postgresql://postgres-test:5432/businessbrain_test
      FLYWAY_USER:     bbuser
      FLYWAY_PASSWORD: bbpassword
      FLYWAY_SCHEMAS:  founder,cycle,memory,campaign,outcome,app,audit
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
      FLYWAY_VALIDATE_ON_MIGRATE: "true"
      FLYWAY_PLACEHOLDER_REPLACEMENT: "false"
    volumes:
      - ./database/migrations:/flyway/sql
    command: migrate
