global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    service:     businessbrain

rule_files:
  - "alerts/*.yml"

scrape_configs:
  - job_name: bb-api
    static_configs:
      - targets: ["bb-api:3000"]
    metrics_path: /health/metrics

  - job_name: bb-workers
    static_configs:
      - targets: ["bb-workers:3001"]
    metrics_path: /

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
