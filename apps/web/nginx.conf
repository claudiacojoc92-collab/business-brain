# Business Brain web — nginx static serving + same-origin API proxy.
# FE uses API_BASE='/' (relative), so /v1 and /auth are proxied to the api service
# (mirrors apps/web/vite.config.ts dev proxy). Everything else is the SPA.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # --- API (same-origin) → api service on the compose network ---
  # `resolver` + variable defers DNS to request time, so nginx starts even if api is down.
  location /v1/ {
    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://api:3000;
    proxy_pass $api_upstream$request_uri;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /auth/ {
    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://api:3000;
    proxy_pass $api_upstream$request_uri;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # --- Account (real product: export / delete) → api service ---
  location /account/ {
    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://api:3000;
    proxy_pass $api_upstream$request_uri;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # --- SPA fallback: client routes (/login, /account, /) ---
  location / {
    try_files $uri $uri/ /index.html;
  }
}
