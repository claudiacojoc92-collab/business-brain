apiVersion: apps/v1
kind: Deployment
metadata:
  name: bb-workers
  namespace: businessbrain
  labels:
    app: bb-workers
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bb-workers
  template:
    metadata:
      labels:
        app: bb-workers
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/health"
        prometheus.io/port: "3001"
    spec:
      containers:
        - name: bb-workers
          image: businessbrain/workers:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: health
          env:
            - name: NODE_ENV
              value: "production"
            - name: WORKER_HEALTH_PORT
              value: "3001"
            - name: SCHEDULER
              value: "false"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: redis-url
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: anthropic-api-key
            - name: KMS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: kms-key-id
          envFrom:
            - configMapRef:
                name: bb-app-config
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu:    "500m"
              memory: "1Gi"
            limits:
              cpu:    "2000m"
              memory: "2Gi"
---
# Scheduler — single replica with leader election via PG advisory lock
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bb-scheduler
  namespace: businessbrain
  labels:
    app: bb-scheduler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bb-scheduler
  template:
    metadata:
      labels:
        app: bb-scheduler
    spec:
      containers:
        - name: bb-scheduler
          image: businessbrain/workers:latest
          imagePullPolicy: Always
          env:
            - name: SCHEDULER
              value: "true"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: bb-secrets
                  key: redis-url
          envFrom:
            - configMapRef:
                name: bb-app-config
          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"
