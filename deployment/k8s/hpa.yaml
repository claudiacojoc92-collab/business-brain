apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bb-api-hpa
  namespace: businessbrain
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bb-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bb-workers-hpa
  namespace: businessbrain
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bb-workers
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
